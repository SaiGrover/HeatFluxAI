# Copy these values into Streamlit Cloud > App > Settings > Secrets.
# Do not commit a real .streamlit/secrets.toml file.

GEE_PROJECT_ID = "your-google-cloud-project-id"
OPENWEATHER_API_KEY = "optional-openweather-key"
CDS_API_KEY = "optional-cds-key"

[gcp_service_account]
type = "service_account"
project_id = "your-google-cloud-project-id"
private_key_id = "..."
private_key = "-----BEGIN PRIVATE KEY-----\n...\n-----END PRIVATE KEY-----\n"
client_email = "your-service-account@your-google-cloud-project-id.iam.gserviceaccount.com"
client_id = "..."
auth_uri = "https://accounts.google.com/o/oauth2/auth"
token_uri = "https://oauth2.googleapis.com/token"
auth_provider_x509_cert_url = "https://www.googleapis.com/oauth2/v1/certs"
client_x509_cert_url = "..."
universe_domain = "googleapis.com"
